<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0e11">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="吃貨配對">
<title>吃貨配對所</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0e11;--surface:#1a1820;
  --yes:#00e87a;--no:#ff3d5a;
  --text:#f5f0ff;--muted:#6b6578;--border:#2a2733;
  --gold:#ffd166;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Noto Sans TC',sans-serif;color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;}

.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.orb1{width:400px;height:400px;background:rgba(0,232,122,0.06);top:-100px;right:-100px;}
.orb2{width:350px;height:350px;background:rgba(255,61,90,0.06);bottom:-80px;left:-80px;}
.orb3{width:300px;height:300px;background:rgba(255,209,102,0.04);top:40%;left:-80px;}

.app{position:relative;z-index:1;width:100%;max-width:420px;height:100%;display:flex;flex-direction:column;padding-top:var(--safe-top);}

/* Header */
.hdr{padding:14px 18px 8px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Dela Gothic One',sans-serif;font-size:20px;letter-spacing:-0.5px;}
.logo span{color:var(--yes);}
.counter-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--muted);font-family:'Dela Gothic One',sans-serif;letter-spacing:1px;}

/* Fortune banner */
.fortune-banner{margin:0 18px 8px;background:linear-gradient(135deg,rgba(255,209,102,0.08),rgba(255,209,102,0.03));border:1px solid rgba(255,209,102,0.2);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.2s;}
.fortune-banner:active{transform:scale(0.98);}
.fortune-icon{font-size:20px;flex-shrink:0;}
.fortune-text{font-size:12px;color:var(--gold);line-height:1.5;flex:1;}
.fortune-tap{font-size:10px;color:var(--muted);white-space:nowrap;}

/* Progress */
.progress-wrap{padding:4px 18px 4px;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--yes),#00bcd4);border-radius:2px;transition:width 0.4s ease;}

/* Stage */
.stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:0 20px;}
.stack{position:relative;width:100%;max-width:340px;height:410px;}

/* Card */
.card{
  position:absolute;inset:0;
  background:var(--surface);border:1px solid var(--border);border-radius:28px;
  overflow:hidden;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;
  will-change:transform;
}
.card:active{cursor:grabbing;}
.card-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:180px;opacity:0.15;transform:scale(1.1);}
.card-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:24px 22px;}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.card-tag{display:inline-flex;align-items:center;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 11px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.card-cal{display:inline-flex;align-items:center;gap:3px;background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.2);border-radius:20px;padding:4px 11px;font-size:10px;font-weight:700;color:var(--gold);}
.card-name{font-family:'Dela Gothic One',sans-serif;font-size:42px;line-height:1;margin-bottom:7px;letter-spacing:-1px;}
.card-desc{font-size:13px;color:rgba(255,255,255,0.45);line-height:1.6;}
.card-emoji-big{font-size:66px;margin-bottom:10px;}

/* Stamps */
.stamp{position:absolute;top:32px;padding:7px 16px;border-radius:10px;font-family:'Dela Gothic One',sans-serif;font-size:24px;letter-spacing:2px;border:4px solid;opacity:0;pointer-events:none;}
.stamp-yes{right:20px;color:var(--yes);border-color:var(--yes);transform:rotate(-15deg);}
.stamp-no{left:20px;color:var(--no);border-color:var(--no);transform:rotate(15deg);}

.card-behind{transform:scale(0.93) translateY(14px);z-index:0;pointer-events:none;}
.card-behind2{transform:scale(0.86) translateY(28px);z-index:-1;pointer-events:none;opacity:0.5;}
.card-top{z-index:10;}

/* Hint */
.swipe-hint{text-align:center;font-size:11px;color:var(--muted);letter-spacing:1px;padding:5px 0 2px;}

/* Actions */
.actions{padding:12px 20px calc(12px + var(--safe-bot));display:flex;align-items:center;justify-content:center;gap:20px;}
.btn-action{width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all 0.15s;-webkit-user-select:none;user-select:none;}
.btn-action:active{transform:scale(0.88);}
.btn-no{background:rgba(255,61,90,0.12);color:var(--no);border:2px solid rgba(255,61,90,0.3);}
.btn-yes{background:rgba(0,232,122,0.12);color:var(--yes);border:2px solid rgba(0,232,122,0.3);}
.btn-undo{width:46px;height:46px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:18px;}

/* Result screen */
.result-screen{display:none;flex-direction:column;align-items:center;padding:24px 20px calc(24px + var(--safe-bot));overflow-y:auto;height:100%;}
.result-screen.show{display:flex;}
.result-top{text-align:center;margin-bottom:20px;}
.result-emoji{font-size:50px;display:block;margin-bottom:8px;}
.result-title{font-family:'Dela Gothic One',sans-serif;font-size:28px;margin-bottom:5px;}
.result-sub{font-size:13px;color:var(--muted);line-height:1.7;}
.liked-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:20px;}
.liked-chip{background:var(--surface);border:1px solid rgba(0,232,122,0.2);border-radius:16px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;}
.liked-chip-emoji{font-size:26px;}
.liked-chip-name{font-size:13px;font-weight:700;text-align:center;}
.liked-chip-tag{font-size:10px;color:var(--muted);}
.btn-restart{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;}
.btn-restart:active{transform:scale(0.97);}

/* Empty */
.empty-screen{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center;gap:12px;}
.empty-screen.show{display:flex;}
.empty-emoji{font-size:64px;}
.empty-title{font-family:'Dela Gothic One',sans-serif;font-size:26px;}
.empty-sub{font-size:14px;color:var(--muted);line-height:1.8;}

/* Fortune modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-sheet{background:#1c1a24;border-radius:24px 24px 0 0;padding:28px 24px calc(32px + var(--safe-bot));width:100%;max-width:420px;animation:up 0.3s ease;text-align:center;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px;}
.modal-fortune-icon{font-size:52px;margin-bottom:14px;display:block;}
.modal-fortune-title{font-family:'Dela Gothic One',sans-serif;font-size:13px;letter-spacing:3px;color:var(--muted);margin-bottom:10px;}
.modal-fortune-main{font-family:'Dela Gothic One',sans-serif;font-size:26px;color:var(--gold);line-height:1.4;margin-bottom:10px;}
.modal-fortune-sub{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:24px;}
.btn-modal-close{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-modal-reroll{background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-top:12px;font-family:'Noto Sans TC',sans-serif;display:block;width:100%;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="app">
  <div class="hdr">
    <div class="logo">吃貨<span>配對</span>所</div>
    <div class="counter-pill" id="counterPill">50 道菜</div>
  </div>

  <!-- Fortune banner -->
  <div class="fortune-banner" id="fortuneBanner" onclick="openFortune()">
    <span class="fortune-icon">🔮</span>
    <span class="fortune-text" id="fortuneShort">載入今日運勢中...</span>
    <span class="fortune-tap">點擊看詳細 →</span>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="stage" id="stage">
    <div class="stack" id="stack"></div>
  </div>

  <div class="swipe-hint" id="swipeHint">← 不要 &nbsp;|&nbsp; 右滑想吃 →</div>

  <div class="actions" id="actionBtns">
    <button class="btn-action btn-no" onclick="swipeCard('no')">✕</button>
    <button class="btn-action btn-undo" onclick="undoSwipe()">↩</button>
    <button class="btn-action btn-yes" onclick="swipeCard('yes')">♥</button>
  </div>

  <!-- Result -->
  <div class="result-screen" id="resultScreen">
    <div class="result-top">
      <span class="result-emoji">🎉</span>
      <div class="result-title">你想吃這些！</div>
      <div class="result-sub" id="resultSub"></div>
    </div>
    <div class="liked-grid" id="likedGrid"></div>
    <button class="btn-restart" onclick="restartApp()">🔄 再刷一次</button>
  </div>

  <!-- Empty -->
  <div class="empty-screen" id="emptyScreen">
    <div class="empty-emoji">😮‍💨</div>
    <div class="empty-title">什麼都不想吃？</div>
    <div class="empty-sub">挑嘴也太厲害了<br>要不要重新再刷一輪？</div>
    <button class="btn-restart" style="margin-top:16px" onclick="restartApp()">🔄 重新開始</button>
  </div>
</div>

<!-- Fortune Modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeFortune()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <span class="modal-fortune-icon" id="mIcon">🔮</span>
    <div class="modal-fortune-title">今日飲食運勢</div>
    <div class="modal-fortune-main" id="mMain">加載中...</div>
    <div class="modal-fortune-sub" id="mSub"></div>
    <button class="btn-modal-close" onclick="closeFortune()">收下這個運勢 ✨</button>
    <button class="btn-modal-reroll" onclick="rollFortune()">🎲 再抽一次</button>
  </div>
</div>

<script>

  {icon:'🥟',main:'吃包餡的，藏著好消息',sub:'今日有隱藏的好消息等你發現。小籠包、水餃、肉圓都是吉祥食物，記得咬開前許願。',short:'吃包餡的，藏好消息 🥟'},
  {icon:'🌙',main:'今天不宜暴飲暴食',sub:'今日腸胃運勢偏弱，輕食為佳。吃七分飽，留三分給生命中的驚喜。',short:'今天不宜暴飲暴食 🌙'},
  {icon:'🔥',main:'今天吃燒烤，熱情燃起',sub:'今日激情指數爆表，燒烤的煙火氣能共鳴你的內在能量。記得不要烤焦，象徵計畫別過頭。',short:'今天吃燒烤，熱情燃起 🔥'},
  {icon:'🥗',main:'吃點蔬食，靈感大爆發',sub:'今天大腦需要清爽的食物啟動。吃素食或沙拉讓思路如泉湧，下午的會議你將成為全場焦點。',short:'吃蔬食，靈感大爆發 🥗'},
  {icon:'🍰',main:'今天必須吃甜點',sub:'不吃甜點今天會後悔。蛋糕、冰淇淋、豆花都有今日特效，把它當作獎勵自己的儀式吧。',short:'今天必須吃甜點 🍰'},
  {icon:'⚡',main:'吃最快的那一個',sub:'今日效率運當道，不要猶豫。看菜單第一眼選到什麼就吃什麼，猶豫只會讓運氣溜走。',short:'吃最快選到的那個 ⚡'},
];

let currentFortune = null;

function getDailyFortune() {
  // Same fortune per day
  const day = new Date().toDateString();
  let hash = 0;
  for (let c of day) hash = (hash * 31 + c.charCodeAt(0)) % FORTUNES.length;
  return FORTUNES[hash];
}

function rollFortune() {
  currentFortune = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
  renderFortune();
}

function renderFortune() {
  document.getElementById('mIcon').textContent = currentFortune.icon;
  document.getElementById('mMain').textContent = currentFortune.main;
  document.getElementById('mSub').textContent = currentFortune.sub;
  document.getElementById('fortuneShort').textContent = currentFortune.short;
}

function openFortune() {
  document.getElementById('modalBg').classList.add('show');
}
function closeFortune() {
  document.getElementById('modalBg').classList.remove('show');
}

// ── State ─────────────────────────────────────────────────
let deck = [], liked = [], history = [];
let isDragging = false, startX = 0, startY = 0, currentX = 0;
let activeCard = null;

// ── Init ──────────────────────────────────────────────────
function init() {
  currentFortune = getDailyFortune();
  renderFortune();
  deck = shuffle([...FOODS]);
  liked = []; history = [];
  renderStack();
  updateProgress();
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('emptyScreen').classList.remove('show');
  document.getElementById('stage').style.display = '';
  document.getElementById('swipeHint').style.display = '';
  document.getElementById('actionBtns').style.display = '';
  document.getElementById('fortuneBanner').style.display = '';
  document.getElementById('progress-wrap') && (document.getElementById('progress-wrap').style.display = '');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderStack() {
  const stack = document.getElementById('stack');
  stack.innerHTML = '';
  deck.slice(0, 3).forEach((food, idx) => stack.prepend(makeCard(food, idx)));
  bindDrag();
}

function makeCard(food, stackIdx) {
  const div = document.createElement('div');
  div.className = 'card ' + (stackIdx === 0 ? 'card-top' : stackIdx === 1 ? 'card-behind' : 'card-behind2');
  div.innerHTML = `
    <div class="card-bg">${food.emoji}</div>
    <div class="stamp stamp-yes">想吃♥</div>
    <div class="stamp stamp-no">不要✕</div>
    <div class="card-content">
      <div class="card-emoji-big">${food.emoji}</div>
      <div class="card-meta">
        <div class="card-tag">${food.tag}</div>
        <div class="card-cal">🔥 ${food.cal} kcal</div>
      </div>
      <div class="card-name">${food.name}</div>
      <div class="card-desc">${food.desc}</div>
    </div>`;
  return div;
}

// ── Drag ──────────────────────────────────────────────────
function bindDrag() {
  const top = document.querySelector('.card-top');
  if (!top) return;
  activeCard = top;
  top.addEventListener('mousedown', dragStart);
  top.addEventListener('touchstart', dragStart, {passive: true});
}

function dragStart(e) {
  isDragging = true;
  const pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX; startY = pt.clientY; currentX = 0;
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('touchmove', dragMove, {passive: false});
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchend', dragEnd);
}

function dragMove(e) {
  if (!isDragging || !activeCard) return;
  if (e.cancelable) e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - startX;
  const dy = (pt.clientY - startY) * 0.3;
  activeCard.style.transform = `translateX(${currentX}px) translateY(${dy}px) rotate(${currentX * 0.08}deg)`;
  activeCard.style.transition = 'none';
  const ratio = Math.min(Math.abs(currentX) / 100, 1);
  activeCard.querySelector('.stamp-yes').style.opacity = currentX > 20 ? ratio : 0;
  activeCard.querySelector('.stamp-no').style.opacity = currentX < -20 ? ratio : 0;
}

function dragEnd() {
  isDragging = false;
  document.removeEventListener('mousemove', dragMove);
  document.removeEventListener('touchmove', dragMove);
  document.removeEventListener('mouseup', dragEnd);
  document.removeEventListener('touchend', dragEnd);
  if (!activeCard) return;
  if (currentX > 80) swipeCard('yes');
  else if (currentX < -80) swipeCard('no');
  else {
    activeCard.style.transition = 'transform 0.4s cubic-bezier(.34,1.56,.64,1)';
    activeCard.style.transform = '';
    activeCard.querySelector('.stamp-yes').style.opacity = 0;
    activeCard.querySelector('.stamp-no').style.opacity = 0;
  }
}

// ── Swipe ─────────────────────────────────────────────────
function swipeCard(dir) {
  if (!activeCard) return;
  const food = deck[0];
  const card = activeCard;
  activeCard = null;
  card.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
  card.style.transform = `translateX(${dir === 'yes' ? 600 : -600}px) rotate(${dir === 'yes' ? 30 : -30}deg)`;
  card.style.opacity = '0';
  history.push({food, dir});
  if (dir === 'yes') liked.push(food);
  deck.shift();
  setTimeout(() => {
    card.remove();
    const cards = [...document.querySelectorAll('.card')];
    cards.forEach((c, i) => {
      c.className = 'card';
      if (i === cards.length - 1) c.classList.add('card-top');
      else if (i === cards.length - 2) c.classList.add('card-behind');
      else c.classList.add('card-behind2');
      c.style.transition = 'transform 0.3s ease';
    });
    if (deck.length >= 3) document.getElementById('stack').prepend(makeCard(deck[2], 2));
    updateProgress();
    if (deck.length === 0) { showEnd(); return; }
    bindDrag();
  }, 350);
}

function undoSwipe() {
  if (!history.length) return;
  const last = history.pop();
  if (last.dir === 'yes') liked = liked.filter(f => f !== last.food);
  deck.unshift(last.food);
  renderStack();
  updateProgress();
}

function updateProgress() {
  const total = FOODS.length;
  const done = total - deck.length;
  document.getElementById('progressFill').style.width = (done / total * 100) + '%';
  document.getElementById('counterPill').textContent =
    deck.length > 0 ? `還剩 ${deck.length} 道` : `❤ ${liked.length} 道`;
}

function showEnd() {
  document.getElementById('stage').style.display = 'none';
  document.getElementById('swipeHint').style.display = 'none';
  document.getElementById('actionBtns').style.display = 'none';
  document.getElementById('fortuneBanner').style.display = 'none';
  if (liked.length === 0) { document.getElementById('emptyScreen').classList.add('show'); return; }
  document.getElementById('resultSub').textContent = `從 50 道菜裡選出 ${liked.length} 道，今天就吃其中一個吧！`;
  const grid = document.getElementById('likedGrid');
  grid.innerHTML = '';
  liked.forEach(food => {
    const chip = document.createElement('div');
    chip.className = 'liked-chip';
    chip.innerHTML = `<div class="liked-chip-emoji">${food.emoji}</div><div class="liked-chip-name">${food.name}</div><div class="liked-chip-tag">${food.tag} · 🔥${food.cal}kcal</div>`;
    grid.appendChild(chip);
  });
  document.getElementById('resultScreen').classList.add('show');
}

function restartApp() { init(); }
init();
</script>
